<svg width="495" height="195" viewBox="0 0 495 195" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="topbar3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#9ece6a"/>
      <stop offset="100%" style="stop-color:#7dcfff"/>
    </linearGradient>
    <clipPath id="bar-clip"><rect x="20" y="56" width="455" height="12" rx="6"/></clipPath>
  </defs>

  <style>
    .card-bg { animation: fadeIn 0.6s ease forwards; }
    @keyframes fadeIn { from{opacity:0;} to{opacity:1;} }

    .accent { animation: slideIn 0.8s cubic-bezier(0.16,1,0.3,1) 0.2s both; transform-origin:left; }
    @keyframes slideIn { from{transform:scaleX(0);} to{transform:scaleX(1);} }
    .shimmer { animation: shimmer 3s ease-in-out 1.5s infinite; }
    @keyframes shimmer { 0%,100%{opacity:1} 50%{opacity:0.7} }

    /* Full bar segments grow from left */
    .seg1 { animation: grow1 1s cubic-bezier(0.16,1,0.3,1) 0.5s both; transform-origin:left; }
    .seg2 { animation: grow1 1s cubic-bezier(0.16,1,0.3,1) 0.65s both; transform-origin:left; }
    .seg3 { animation: grow1 1s cubic-bezier(0.16,1,0.3,1) 0.8s both; transform-origin:left; }
    .seg4 { animation: grow1 1s cubic-bezier(0.16,1,0.3,1) 0.95s both; transform-origin:left; }
    @keyframes grow1 { from{transform:scaleX(0);} to{transform:scaleX(1);} }

    /* Row bars */
    .row1 { animation: grow1 1.1s cubic-bezier(0.16,1,0.3,1) 0.8s both; transform-origin:left; }
    .row2 { animation: grow1 1.1s cubic-bezier(0.16,1,0.3,1) 0.95s both; transform-origin:left; }
    .row3 { animation: grow1 1.1s cubic-bezier(0.16,1,0.3,1) 1.1s both; transform-origin:left; }

    /* Legend dots pop in */
    .dot1 { animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1) 0.6s both; }
    .dot2 { animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1) 0.72s both; }
    .dot3 { animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1) 0.84s both; }
    .dot4 { animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1) 0.96s both; }
    @keyframes popIn { from{opacity:0;transform:scale(0);} to{opacity:1;transform:scale(1);} }

    .label { animation: fadeIn 0.5s ease 0.3s both; }
    .label2 { animation: fadeIn 0.5s ease 0.9s both; }
  </style>

  <!-- Background -->
  <rect class="card-bg" width="495" height="195" rx="12" fill="#1a1b2e"/>
  <rect class="accent shimmer" width="495" height="3" rx="2" fill="url(#topbar3)"/>
  <rect width="495" height="195" rx="12" fill="none" stroke="#0f3460" stroke-width="1"/>

  <!-- Code icon -->
  <text class="label" x="20" y="33" font-family="monospace" font-size="18" fill="#9ece6a">&lt;/&gt;</text>
  <text class="label" x="52" y="30" font-family="'Segoe UI', Ubuntu, sans-serif" font-size="15" font-weight="700" fill="#c0caf5">Top Languages</text>

  <!-- Divider -->
  <line x1="20" y1="44" x2="475" y2="44" stroke="#0f3460" stroke-width="1"/>

  <!-- Stacked bar with clip -->
  <g clip-path="url(#bar-clip)">
    <rect class="seg1" x="20"  y="56" width="346" height="12" fill="#3d79f0"/>
    <rect class="seg2" x="366" y="56" width="72"  height="12" fill="#ff9e64"/>
    <rect class="seg3" x="438" y="56" width="38"  height="12" fill="#9ece6a"/>
    <rect class="seg4" x="20"  y="56" width="10"  height="12" fill="#3d79f0"/>
  </g>

  <!-- Legend -->
  <circle class="dot1" cx="30"  cy="92" r="6" fill="#3d79f0"/>
  <text class="label2" x="42"  y="97"  font-family="'Segoe UI', Ubuntu, monospace" font-size="12" fill="#c0caf5">Python</text>
  <text class="label2" x="42"  y="112" font-family="'Segoe UI', Ubuntu, monospace" font-size="11" fill="#565f89">72.4%</text>

  <circle class="dot2" cx="140" cy="92" r="6" fill="#ff9e64"/>
  <text class="label2" x="152" y="97"  font-family="'Segoe UI', Ubuntu, monospace" font-size="12" fill="#c0caf5">C++</text>
  <text class="label2" x="152" y="112" font-family="'Segoe UI', Ubuntu, monospace" font-size="11" fill="#565f89">15.1%</text>

  <circle class="dot3" cx="240" cy="92" r="6" fill="#9ece6a"/>
  <text class="label2" x="252" y="97"  font-family="'Segoe UI', Ubuntu, monospace" font-size="12" fill="#c0caf5">MATLAB</text>
  <text class="label2" x="252" y="112" font-family="'Segoe UI', Ubuntu, monospace" font-size="11" fill="#565f89">8.3%</text>

  <circle class="dot4" cx="350" cy="92" r="6" fill="#bb9af7"/>
  <text class="label2" x="362" y="97"  font-family="'Segoe UI', Ubuntu, monospace" font-size="12" fill="#c0caf5">Shell</text>
  <text class="label2" x="362" y="112" font-family="'Segoe UI', Ubuntu, monospace" font-size="11" fill="#565f89">4.2%</text>

  <!-- Divider -->
  <line x1="20" y1="128" x2="475" y2="128" stroke="#0f3460" stroke-width="1"/>

  <!-- Row bars -->
  <circle class="dot1" cx="30" cy="148" r="4" fill="#3d79f0"/>
  <text class="label2" x="42" y="152" font-family="'Segoe UI', Ubuntu, monospace" font-size="11" fill="#c0caf5">Python</text>
  <rect x="110" y="143" width="240" height="7" rx="3" fill="#16213e"/>
  <rect class="row1" x="110" y="143" width="173" height="7" rx="3" fill="#3d79f0"/>
  <text class="label2" x="362" y="152" font-family="'Segoe UI', Ubuntu, monospace" font-size="11" fill="#3d79f0">72.4%</text>

  <circle class="dot2" cx="30" cy="167" r="4" fill="#ff9e64"/>
  <text class="label2" x="42" y="171" font-family="'Segoe UI', Ubuntu, monospace" font-size="11" fill="#c0caf5">C++</text>
  <rect x="110" y="162" width="240" height="7" rx="3" fill="#16213e"/>
  <rect class="row2" x="110" y="162" width="36" height="7" rx="3" fill="#ff9e64"/>
  <text class="label2" x="362" y="171" font-family="'Segoe UI', Ubuntu, monospace" font-size="11" fill="#ff9e64">15.1%</text>

  <circle class="dot3" cx="30" cy="186" r="4" fill="#9ece6a"/>
  <text class="label2" x="42" y="190" font-family="'Segoe UI', Ubuntu, monospace" font-size="11" fill="#c0caf5">MATLAB</text>
  <rect x="110" y="181" width="240" height="7" rx="3" fill="#16213e"/>
  <rect class="row3" x="110" y="181" width="20" height="7" rx="3" fill="#9ece6a"/>
  <text class="label2" x="362" y="190" font-family="'Segoe UI', Ubuntu, monospace" font-size="11" fill="#9ece6a">8.3%</text>
</svg>
