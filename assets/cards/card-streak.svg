<svg width="495" height="195" viewBox="0 0 495 195" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="topbar2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff9e64"/>
      <stop offset="100%" style="stop-color:#f7768e"/>
    </linearGradient>
    <linearGradient id="ringgrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7dcfff"/>
      <stop offset="100%" style="stop-color:#bb9af7"/>
    </linearGradient>
  </defs>

  <style>
    .card-bg { animation: fadeIn 0.6s ease forwards; }
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }

    .accent { animation: slideIn 0.8s cubic-bezier(0.16,1,0.3,1) 0.2s both; transform-origin: left; }
    @keyframes slideIn { from { transform:scaleX(0); } to { transform:scaleX(1); } }

    /* Flame flicker */
    .flame { animation: flicker 1.8s ease-in-out 1s infinite; transform-origin: 26px 30px; }
    @keyframes flicker {
      0%,100% { transform: scaleY(1) scaleX(1); opacity:1; }
      30%      { transform: scaleY(1.06) scaleX(0.96); opacity:0.9; }
      60%      { transform: scaleY(0.95) scaleX(1.04); opacity:1; }
    }

    /* Numbers pop in */
    .num1 { animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1) 0.4s both; }
    .num2 { animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1) 0.6s both; }
    .num3 { animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1) 0.8s both; }
    @keyframes popIn { from { opacity:0; transform:scale(0.5); } to { opacity:1; transform:scale(1); } }

    /* Ring draws itself */
    .ring-arc {
      stroke-dasharray: 239;
      stroke-dashoffset: 239;
      animation: drawRing 1.4s cubic-bezier(0.16,1,0.3,1) 0.7s forwards;
    }
    @keyframes drawRing { to { stroke-dashoffset: 227; } }

    /* Shimmer on accent */
    .shimmer { animation: shimmer 3s ease-in-out 1.5s infinite; }
    @keyframes shimmer { 0%,100%{opacity:1} 50%{opacity:0.7} }

    .label { animation: fadeIn 0.5s ease 0.3s both; }
  </style>

  <!-- Background -->
  <rect class="card-bg" width="495" height="195" rx="12" fill="#1a1b2e"/>
  <rect class="accent shimmer" width="495" height="3" rx="2" fill="url(#topbar2)"/>
  <rect width="495" height="195" rx="12" fill="none" stroke="#0f3460" stroke-width="1"/>

  <!-- Flame icon animated -->
  <g class="flame">
    <path d="M26 14c0 0-7 5-7 11.5a7 7 0 0014 0c0-3-1.5-5.5-3-7-0.5 2-2 3-2 3s-1-2.5-1-4c0 0-1 1.5-1 3.5 0 1.5 1 2.5 1 2.5s-2-1-2-4C25 18 26 14 26 14z" fill="#ff9e64"/>
    <path d="M26 20c0 0-3 2-3 5.5a3 3 0 006 0C29 23.5 26 20 26 20z" fill="#f7768e"/>
  </g>

  <!-- Title -->
  <text class="label" x="47" y="30" font-family="'Segoe UI', Ubuntu, sans-serif" font-size="15" font-weight="700" fill="#c0caf5">Contribution Streak</text>

  <!-- Divider -->
  <line x1="20" y1="44" x2="475" y2="44" stroke="#0f3460" stroke-width="1"/>

  <!-- Panel 1: Total -->
  <text class="label" x="83" y="80" font-family="'Segoe UI', Ubuntu, monospace" font-size="11" fill="#565f89" text-anchor="middle">Total Contributions</text>
  <text class="num1" x="83" y="120" font-family="'Segoe UI', Ubuntu, monospace" font-size="34" font-weight="700" fill="#7aa2f7" text-anchor="middle">152</text>
  <text class="label" x="83" y="138" font-family="'Segoe UI', Ubuntu, monospace" font-size="10" fill="#565f89" text-anchor="middle">Jan 28, 2025</text>
  <text class="label" x="83" y="150" font-family="'Segoe UI', Ubuntu, monospace" font-size="10" fill="#565f89" text-anchor="middle">– Present</text>

  <!-- Divider 1 -->
  <line x1="166" y1="52" x2="166" y2="175" stroke="#0f3460" stroke-width="1"/>

  <!-- Panel 2: Ring -->
  <circle cx="247" cy="108" r="38" fill="none" stroke="#16213e" stroke-width="6"/>
  <circle class="ring-arc" cx="247" cy="108" r="38" fill="none" stroke="url(#ringgrad)" stroke-width="6"
    stroke-linecap="round" transform="rotate(-90 247 108)"/>
  <text class="num2" x="247" y="103" font-family="'Segoe UI', Ubuntu, monospace" font-size="28" font-weight="700" fill="#7dcfff" text-anchor="middle">1</text>
  <text class="label" x="247" y="118" font-family="'Segoe UI', Ubuntu, monospace" font-size="9" fill="#bb9af7" text-anchor="middle">CURRENT STREAK</text>
  <text class="label" x="247" y="160" font-family="'Segoe UI', Ubuntu, monospace" font-size="10" fill="#565f89" text-anchor="middle">Apr 3</text>

  <!-- Divider 2 -->
  <line x1="328" y1="52" x2="328" y2="175" stroke="#0f3460" stroke-width="1"/>

  <!-- Panel 3: Longest -->
  <text class="label" x="411" y="80" font-family="'Segoe UI', Ubuntu, monospace" font-size="11" fill="#565f89" text-anchor="middle">Longest Streak</text>
  <text class="num3" x="411" y="120" font-family="'Segoe UI', Ubuntu, monospace" font-size="34" font-weight="700" fill="#e0af68" text-anchor="middle">4</text>
  <text class="label" x="411" y="138" font-family="'Segoe UI', Ubuntu, monospace" font-size="10" fill="#565f89" text-anchor="middle">Mar 12</text>
  <text class="label" x="411" y="150" font-family="'Segoe UI', Ubuntu, monospace" font-size="10" fill="#565f89" text-anchor="middle">– Mar 15</text>

  <!-- Bottom -->
  <text class="label" x="247" y="185" font-family="'Segoe UI', Ubuntu, monospace" font-size="10" fill="#565f89" text-anchor="middle">github.com/mokshan-123</text>
</svg>
