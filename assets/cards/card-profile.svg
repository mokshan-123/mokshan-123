<svg width="495" height="195" viewBox="0 0 495 195" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="topbar4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#bb9af7"/>
      <stop offset="100%" style="stop-color:#7aa2f7"/>
    </linearGradient>
    <linearGradient id="avatargrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#bb9af7;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#7aa2f7;stop-opacity:0.1"/>
    </linearGradient>
  </defs>

  <style>
    .card-bg { animation: fadeIn 0.6s ease forwards; }
    @keyframes fadeIn { from{opacity:0;} to{opacity:1;} }

    .accent { animation: slideIn 0.8s cubic-bezier(0.16,1,0.3,1) 0.2s both; transform-origin:left; }
    @keyframes slideIn { from{transform:scaleX(0);} to{transform:scaleX(1);} }
    .shimmer { animation: shimmer 3s ease-in-out 1.5s infinite; }
    @keyframes shimmer { 0%,100%{opacity:1} 50%{opacity:0.7} }

    /* Avatar pulse ring */
    .avatar-ring {
      animation: avatarPulse 2.5s ease-in-out 1s infinite;
      transform-origin: 50px 95px;
    }
    @keyframes avatarPulse {
      0%,100% { stroke-width:2; opacity:1; }
      50%      { stroke-width:3; opacity:0.7; }
    }

    /* Avatar scale in */
    .avatar { animation: scaleIn 0.6s cubic-bezier(0.34,1.56,0.64,1) 0.3s both; transform-origin: 50px 95px; }
    @keyframes scaleIn { from{transform:scale(0);opacity:0;} to{transform:scale(1);opacity:1;} }

    /* Name slides in */
    .name { animation: slideRight 0.6s cubic-bezier(0.16,1,0.3,1) 0.5s both; }
    @keyframes slideRight { from{opacity:0;transform:translateX(-10px);} to{opacity:1;transform:none;} }

    /* Tags stagger in */
    .tag1 { animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1) 0.7s both; }
    .tag2 { animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1) 0.82s both; }
    .tag3 { animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1) 0.94s both; }
    .tag4 { animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1) 1.06s both; }
    .tag5 { animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1) 1.18s both; }
    @keyframes popIn { from{opacity:0;transform:scale(0.6);} to{opacity:1;transform:scale(1);} }

    /* Stat numbers count up feel */
    .stat1 { animation: fadeUp 0.5s ease 1s both; }
    .stat2 { animation: fadeUp 0.5s ease 1.15s both; }
    .stat3 { animation: fadeUp 0.5s ease 1.3s both; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(6px);} to{opacity:1;transform:none;} }

    .label { animation: fadeIn 0.5s ease 0.3s both; }
  </style>

  <!-- Background -->
  <rect class="card-bg" width="495" height="195" rx="12" fill="#1a1b2e"/>
  <rect class="accent shimmer" width="495" height="3" rx="2" fill="url(#topbar4)"/>
  <rect width="495" height="195" rx="12" fill="none" stroke="#0f3460" stroke-width="1"/>

  <!-- Avatar -->
  <circle class="avatar" cx="50" cy="95" r="32" fill="url(#avatargrad)" stroke="none"/>
  <circle class="avatar-ring" cx="50" cy="95" r="32" fill="#16213e" stroke="#bb9af7" stroke-width="2"/>
  <text class="avatar" x="50" y="101" font-family="'Segoe UI', Ubuntu, monospace" font-size="18" font-weight="700" fill="#bb9af7" text-anchor="middle">MC</text>

  <!-- Name & bio -->
  <text class="name" x="100" y="72" font-family="'Segoe UI', Ubuntu, sans-serif" font-size="16" font-weight="700" fill="#c0caf5">Mokshan Colombage</text>
  <text class="name" x="100" y="90" font-family="'Segoe UI', Ubuntu, sans-serif" font-size="11" fill="#565f89">Signal Processing &amp; ML Enthusiast</text>
  <text class="name" x="100" y="105" font-family="'Segoe UI', Ubuntu, sans-serif" font-size="11" fill="#565f89">Biomedical Engineering · University of Moratuwa</text>

  <!-- Tags -->
  <rect class="tag1" x="100" y="112" width="64" height="18" rx="9" fill="#1e2d5a"/>
  <text class="tag1" x="132" y="124" font-family="'Segoe UI', Ubuntu, monospace" font-size="10" fill="#7aa2f7" text-anchor="middle">Python</text>

  <rect class="tag2" x="170" y="112" width="72" height="18" rx="9" fill="#1e2d5a"/>
  <text class="tag2" x="206" y="124" font-family="'Segoe UI', Ubuntu, monospace" font-size="10" fill="#bb9af7" text-anchor="middle">PyTorch</text>

  <rect class="tag3" x="248" y="112" width="80" height="18" rx="9" fill="#1e2d5a"/>
  <text class="tag3" x="288" y="124" font-family="'Segoe UI', Ubuntu, monospace" font-size="10" fill="#9ece6a" text-anchor="middle">TensorFlow</text>

  <rect class="tag4" x="334" y="112" width="68" height="18" rx="9" fill="#1e2d5a"/>
  <text class="tag4" x="368" y="124" font-family="'Segoe UI', Ubuntu, monospace" font-size="10" fill="#7dcfff" text-anchor="middle">OpenCV</text>

  <rect class="tag5" x="408" y="112" width="58" height="18" rx="9" fill="#1e2d5a"/>
  <text class="tag5" x="437" y="124" font-family="'Segoe UI', Ubuntu, monospace" font-size="10" fill="#e0af68" text-anchor="middle">MATLAB</text>

  <!-- Divider -->
  <line x1="20" y1="140" x2="475" y2="140" stroke="#0f3460" stroke-width="1"/>

  <!-- Stats -->
  <text class="stat1" x="83"  y="160" font-family="'Segoe UI', Ubuntu, monospace" font-size="20" font-weight="700" fill="#7aa2f7" text-anchor="middle">152</text>
  <text class="label" x="83"  y="175" font-family="'Segoe UI', Ubuntu, monospace" font-size="10" fill="#565f89" text-anchor="middle">Contributions</text>

  <line x1="166" y1="148" x2="166" y2="182" stroke="#0f3460" stroke-width="1"/>

  <text class="stat2" x="247" y="160" font-family="'Segoe UI', Ubuntu, monospace" font-size="20" font-weight="700" fill="#e0af68" text-anchor="middle">4</text>
  <text class="label" x="247" y="175" font-family="'Segoe UI', Ubuntu, monospace" font-size="10" fill="#565f89" text-anchor="middle">Longest Streak</text>

  <line x1="328" y1="148" x2="328" y2="182" stroke="#0f3460" stroke-width="1"/>

  <text class="stat3" x="411" y="160" font-family="'Segoe UI', Ubuntu, monospace" font-size="20" font-weight="700" fill="#9ece6a" text-anchor="middle">1</text>
  <text class="label" x="411" y="175" font-family="'Segoe UI', Ubuntu, monospace" font-size="10" fill="#565f89" text-anchor="middle">Current Streak</text>
</svg>
